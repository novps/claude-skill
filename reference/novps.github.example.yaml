envs:
  - key: LOG_LEVEL
    value: info
  - key: DB_URL
    value: ${DB_URL}

resources:
  - name: api
    type: web-app
    source_type: github
    source:
      type: github
      repository: owner/repo
      branch: main
      source_dir: ./
      build_command: docker build .
      build_envs:
        - key: NODE_ENV
          value: production
    config:
      port: "8080"
      restart_policy: always
    replicas:
      type: sm
      count: 2
    envs: []
    volumes: []
